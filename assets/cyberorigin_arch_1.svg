<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<title>CyberOrigin 系统架构</title>
<desc>七层EgoCentric数据平台架构：硬件生产、运营渠道、多模态采集、数据传输、云端QC、模型训练验证、客户交付</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; fill: #444; }
    .coral-fill   { fill: #c0392b; }
    .coral-box    { fill: #f5cbc7; stroke: #c0392b; }
    .coral-text   { fill: #7b1a14; }
    .coral-sub    { fill: #a93226; }
    .teal-box     { fill: #d1f0e8; stroke: #1a7a5e; }
    .teal-text    { fill: #0e5c46; }
    .teal-sub     { fill: #1a7a5e; }
    .amber-box    { fill: #fdebd0; stroke: #b7770d; }
    .amber-text   { fill: #7d5c0a; }
    .amber-sub    { fill: #b7770d; }
    .gray-box     { fill: #ebebeb; stroke: #888; }
    .gray-text    { fill: #333; }
    .gray-sub     { fill: #666; }
    .purple-box   { fill: #e8e4f7; stroke: #6c5bbd; }
    .purple-text  { fill: #3d2e8a; }
    .purple-sub   { fill: #6c5bbd; }
    .blue-box     { fill: #daeaf9; stroke: #1f6fb5; }
    .blue-text    { fill: #0c3f6b; }
    .blue-sub     { fill: #1f6fb5; }
    .green-box    { fill: #d6f0da; stroke: #2e7d32; }
    .green-text   { fill: #1b5e20; }
    .green-sub    { fill: #2e7d32; }
    .connector    { stroke: #888; stroke-width: 0.8; fill: none; }
  </style>
</defs>

<!-- Row 1: Hardware -->
<rect x="100" y="40" width="480" height="52" rx="8" class="coral-box" stroke-width="0.5"/>
<text class="th coral-text" x="340" y="62" text-anchor="middle" dominant-baseline="central">硬件设备生产</text>
<text class="ts coral-sub" x="340" y="80" text-anchor="middle" dominant-baseline="central">EgoCentric 传感器 · 计算模块 · 固件 · 供应链管理</text>

<!-- Fan from Row 1 -->
<line x1="340" y1="92" x2="340" y2="107" class="connector"/>
<line x1="130" y1="107" x2="550" y2="107" class="connector"/>
<line x1="130" y1="107" x2="130" y2="120" class="connector" marker-end="url(#a)"/>
<line x1="340" y1="107" x2="340" y2="120" class="connector" marker-end="url(#a)"/>
<line x1="550" y1="107" x2="550" y2="120" class="connector" marker-end="url(#a)"/>

<!-- Row 2: Channels -->
<rect x="40" y="122" width="180" height="52" rx="8" class="teal-box" stroke-width="0.5"/>
<text class="th teal-text" x="130" y="144" text-anchor="middle" dominant-baseline="central">消费者可穿戴</text>
<text class="ts teal-sub" x="130" y="162" text-anchor="middle" dominant-baseline="central">眼镜 · 头盔 · 身体摄像</text>

<rect x="250" y="122" width="180" height="52" rx="8" class="teal-box" stroke-width="0.5"/>
<text class="th teal-text" x="340" y="144" text-anchor="middle" dominant-baseline="central">企业 / B2B</text>
<text class="ts teal-sub" x="340" y="162" text-anchor="middle" dominant-baseline="central">机器人 · 车辆 · 自动驾驶</text>

<rect x="460" y="122" width="180" height="52" rx="8" class="teal-box" stroke-width="0.5"/>
<text class="th teal-text" x="550" y="144" text-anchor="middle" dominant-baseline="central">研究机构部署</text>
<text class="ts teal-sub" x="550" y="162" text-anchor="middle" dominant-baseline="central">实验室 · 临床 · 野外场地</text>

<line x1="130" y1="174" x2="130" y2="208" class="connector" marker-end="url(#a)"/>
<line x1="340" y1="174" x2="340" y2="208" class="connector" marker-end="url(#a)"/>
<line x1="550" y1="174" x2="550" y2="208" class="connector" marker-end="url(#a)"/>

<!-- Row 3: Capture -->
<rect x="40" y="210" width="600" height="52" rx="8" class="amber-box" stroke-width="0.5"/>
<text class="th amber-text" x="340" y="232" text-anchor="middle" dominant-baseline="central">EgoCentric 多模态采集层</text>
<text class="ts amber-sub" x="340" y="250" text-anchor="middle" dominant-baseline="central">RGB · 深度 · IMU · 眼动追踪 · 音频 · GPS · 生理信号</text>

<line x1="130" y1="262" x2="130" y2="293" class="connector" marker-end="url(#a)"/>
<line x1="340" y1="262" x2="340" y2="293" class="connector" marker-end="url(#a)"/>
<line x1="550" y1="262" x2="550" y2="293" class="connector" marker-end="url(#a)"/>

<!-- Row 4: Transmission -->
<rect x="40" y="295" width="180" height="52" rx="8" class="gray-box" stroke-width="0.5"/>
<text class="th gray-text" x="130" y="317" text-anchor="middle" dominant-baseline="central">边缘端处理</text>
<text class="ts gray-sub" x="130" y="335" text-anchor="middle" dominant-baseline="central">压缩 · 加密 · 缓冲</text>

<rect x="250" y="295" width="180" height="52" rx="8" class="gray-box" stroke-width="0.5"/>
<text class="th gray-text" x="340" y="317" text-anchor="middle" dominant-baseline="central">安全上行链路</text>
<text class="ts gray-sub" x="340" y="335" text-anchor="middle" dominant-baseline="central">5G · WiFi · 断点续传</text>

<rect x="460" y="295" width="180" height="52" rx="8" class="gray-box" stroke-width="0.5"/>
<text class="th gray-text" x="550" y="317" text-anchor="middle" dominant-baseline="central">全球 CDN 接入</text>
<text class="ts gray-sub" x="550" y="335" text-anchor="middle" dominant-baseline="central">多区域摄取节点</text>

<line x1="130" y1="347" x2="130" y2="378" class="connector" marker-end="url(#a)"/>
<line x1="340" y1="347" x2="340" y2="378" class="connector" marker-end="url(#a)"/>
<line x1="550" y1="347" x2="550" y2="378" class="connector" marker-end="url(#a)"/>

<!-- Row 5: Cloud QC container -->
<rect x="30" y="380" width="620" height="130" rx="12" class="purple-box" stroke-width="0.5"/>
<text class="th purple-text" x="340" y="400" text-anchor="middle" dominant-baseline="central">云端 QC 与预处理</text>

<rect x="48" y="413" width="183" height="75" rx="6" class="blue-box" stroke-width="0.5"/>
<text class="th blue-text" x="139" y="432" text-anchor="middle" dominant-baseline="central">摄取 &amp; QC</text>
<text class="ts blue-sub" x="139" y="450" text-anchor="middle" dominant-baseline="central">完整性 · 去重 · 对齐</text>
<text class="ts blue-sub" x="139" y="466" text-anchor="middle" dominant-baseline="central">隐私合规审核</text>

<rect x="249" y="413" width="183" height="75" rx="6" class="blue-box" stroke-width="0.5"/>
<text class="th blue-text" x="340" y="432" text-anchor="middle" dominant-baseline="central">标注流水线</text>
<text class="ts blue-sub" x="340" y="450" text-anchor="middle" dominant-baseline="central">自动标注 + HITL</text>
<text class="ts blue-sub" x="340" y="466" text-anchor="middle" dominant-baseline="central">体系版本管理</text>

<rect x="450" y="413" width="183" height="75" rx="6" class="blue-box" stroke-width="0.5"/>
<text class="th blue-text" x="541" y="432" text-anchor="middle" dominant-baseline="central">特征提取</text>
<text class="ts blue-sub" x="541" y="450" text-anchor="middle" dominant-baseline="central">Token · 嵌入 · 场景图</text>
<text class="ts blue-sub" x="541" y="466" text-anchor="middle" dominant-baseline="central">训练格式封装</text>

<!-- Container to Row 6 fork -->
<line x1="340" y1="510" x2="340" y2="522" class="connector"/>
<line x1="178" y1="522" x2="502" y2="522" class="connector"/>
<line x1="178" y1="522" x2="178" y2="533" class="connector" marker-end="url(#a)"/>
<line x1="502" y1="522" x2="502" y2="533" class="connector" marker-end="url(#a)"/>

<!-- Row 6: Model + Validation -->
<rect x="40" y="535" width="275" height="52" rx="8" class="purple-box" stroke-width="0.5"/>
<text class="th purple-text" x="178" y="557" text-anchor="middle" dominant-baseline="central">世界模型训练</text>
<text class="ts purple-sub" x="178" y="575" text-anchor="middle" dominant-baseline="central">EgoVideo · 3D 重建 · 动作预测</text>

<rect x="365" y="535" width="275" height="52" rx="8" class="blue-box" stroke-width="0.5"/>
<text class="th blue-text" x="502" y="557" text-anchor="middle" dominant-baseline="central">算法验证</text>
<text class="ts blue-sub" x="502" y="575" text-anchor="middle" dominant-baseline="central">Benchmark · 消融 · 回归测试</text>

<!-- Row 6 to Row 7 merge-fan -->
<line x1="178" y1="587" x2="178" y2="600" class="connector"/>
<line x1="502" y1="587" x2="502" y2="600" class="connector"/>
<line x1="178" y1="600" x2="502" y2="600" class="connector"/>
<line x1="340" y1="600" x2="340" y2="608" class="connector"/>
<line x1="130" y1="608" x2="550" y2="608" class="connector"/>
<line x1="130" y1="608" x2="130" y2="622" class="connector" marker-end="url(#a)"/>
<line x1="340" y1="608" x2="340" y2="622" class="connector" marker-end="url(#a)"/>
<line x1="550" y1="608" x2="550" y2="622" class="connector" marker-end="url(#a)"/>

<!-- Row 7: Customer Delivery -->
<rect x="40" y="624" width="180" height="52" rx="8" class="green-box" stroke-width="0.5"/>
<text class="th green-text" x="130" y="646" text-anchor="middle" dominant-baseline="central">数据集交付</text>
<text class="ts green-sub" x="130" y="664" text-anchor="middle" dominant-baseline="central">版本化 · 签名 · 验收</text>

<rect x="250" y="624" width="180" height="52" rx="8" class="green-box" stroke-width="0.5"/>
<text class="th green-text" x="340" y="646" text-anchor="middle" dominant-baseline="central">模型 API / SDK</text>
<text class="ts green-sub" x="340" y="664" text-anchor="middle" dominant-baseline="central">推理 · 微调端点</text>

<rect x="460" y="624" width="180" height="52" rx="8" class="green-box" stroke-width="0.5"/>
<text class="th green-text" x="550" y="646" text-anchor="middle" dominant-baseline="central">验证仪表盘</text>
<text class="ts green-sub" x="550" y="664" text-anchor="middle" dominant-baseline="central">KPI · 漂移监控 · 验收</text>
</svg>
